name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk-tests:
    name: SDK Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install SDK dependencies
        run: |
          cd sdk
          uv venv
          uv pip install -e .

      - name: Install test dependencies
        run: |
          cd tests
          uv pip install --system pytest pytest-asyncio httpx starlette
          uv pip install --system -e ../sdk

      - name: Run SDK tests
        run: |
          cd tests
          python -m pytest sdk/ -v

  collector-lint:
    name: Collector Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv pip install --system fastapi sqlalchemy asyncpg alembic redis pydantic pydantic-settings uvicorn

      - name: Check imports
        run: |
          python -c "from collector.main import app; print('Collector imports OK')"

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd dashboard
          npm install --legacy-peer-deps

      - name: Build
        run: |
          cd dashboard
          npm run build
