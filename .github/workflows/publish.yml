name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  # ── Publish Docker images to GHCR ───────────────────────────────────────
  docker:
    name: Publish Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Extract version and owner
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push collector
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.collector
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/mateobserve-collector:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/mateobserve-collector:${{ steps.meta.outputs.version }}

      - name: Build and push dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/mateobserve-dashboard:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/mateobserve-dashboard:${{ steps.meta.outputs.version }}

